<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/png"href="favicon-5.png">
<meta property="og:title" content="Innerspace"/>
<meta property="og:image" content="https://innerspace.fun" />
<meta property="og:url" content="https://innerspace.com" />
<meta property="og:description" content="Innerspace provides with best interior designs and smoothest installation one can ask for. Modernising your living space elegantly" />
<title>Innerspace — Luxury Interior Design</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<!-- Elfsight loaded here, outside React/Babel -->
<script src="https://elfsightcdn.com/platform.js" async></script>
<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- React + Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;
  --black:#080808;--black-mid:#101010;--black-card:#141414;--black-soft:#1a1a1a;
  --white:#F5F0E8;--gray:rgba(245,240,232,0.58);
  --rail:72px;--drawer:260px;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;overflow-x:hidden}

/* ─── CURSOR ─── */
.cur,.cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.cur{width:8px;height:8px;background:var(--gold);transition:transform .1s}
.cur-ring{width:32px;height:32px;border:1px solid var(--gold);opacity:.5;transition:width .3s,height .3s,opacity .3s,left .15s,top .15s}
.cur-ring.big{width:56px;height:56px;opacity:.22}
@media(hover:none){.cur,.cur-ring{display:none}body{cursor:auto}}

/* ─── LAYOUT ─── */
#app{display:flex;min-height:100vh}
.main{flex:1;min-width:0;transition:margin-left .42s var(--ease)}
.main.shifted{margin-left:var(--rail)}

/* ─── SIDEBAR RAIL ─── */
.rail{
  position:fixed;left:0;top:0;bottom:0;
  width:var(--rail);
  background:var(--black-mid);
  border-right:.5px solid rgba(201,168,76,.13);
  z-index:500;
  display:flex;flex-direction:column;align-items:center;
  padding:1.4rem 0;
  transition:width .42s var(--ease);
}
.rail.open{width:var(--drawer);align-items:flex-start}

/* hamburger */
.hbg{
  width:40px;height:40px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  flex-shrink:0;margin-left:16px;margin-bottom:1.6rem;
}
.rail.open .hbg{margin-left:calc(var(--drawer) - var(--rail) - 4px)}
.hbg span{display:block;height:1.5px;background:var(--gold);transition:all .3s}
.hbg span:nth-child(1){width:22px}
.hbg span:nth-child(2){width:15px}
.hbg span:nth-child(3){width:22px}
.hbg.on span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px);width:22px}
.hbg.on span:nth-child(2){opacity:0;width:0}
.hbg.on span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px);width:22px}

/* logo inside rail */
.rail-logo{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;
  letter-spacing:.12em;color:var(--gold);white-space:nowrap;
  padding:0 1.1rem;margin-bottom:1.8rem;
  max-width:0;overflow:hidden;opacity:0;
  transition:max-width .35s .1s,opacity .3s .15s;
}
.rail.open .rail-logo{max-width:200px;opacity:1}

/* nav items */
.rail-nav{display:flex;flex-direction:column;gap:.3rem;width:100%;padding:0 .7rem;flex:1}
.nav-btn{
  display:flex;align-items:center;gap:.9rem;
  padding:.72rem .8rem;border-radius:4px;
  background:none;border:none;cursor:pointer;
  color:rgba(245,240,232,.48);
  font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  white-space:nowrap;width:100%;
  transition:background .25s,color .25s;
}
.nav-btn:hover{background:rgba(201,168,76,.07);color:var(--white)}
.nav-btn.active{background:rgba(201,168,76,.12);color:var(--gold)}
.nav-icon{flex-shrink:0;width:22px;text-align:center;font-size:1rem}
.nav-lbl{opacity:0;transition:opacity .25s .12s;font-size:.6rem;letter-spacing:.18em}
.rail.open .nav-lbl{opacity:1}

/* vertical text when closed */
.rail-tag{
  writing-mode:vertical-rl;font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(201,168,76,.3);margin-top:auto;margin-bottom:1rem;
  transition:opacity .2s;pointer-events:none;
}
.rail.open .rail-tag{opacity:0}

/* social links bottom of rail */
.rail-socials{display:flex;flex-direction:column;gap:.6rem;padding:.8rem .7rem}
.rail-social{
  width:32px;height:32px;border:.5px solid rgba(201,168,76,.2);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-family:'Cormorant Garamond',serif;
  color:var(--gold);text-decoration:none;
  transition:border-color .3s,background .3s;
}
.rail-social:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}

/* overlay behind open rail */
.rail-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:499;
}
.rail-overlay.show{display:block}

/* ─── MOBILE TOPBAR ─── */
.topbar{
  display:none;
  position:fixed;left:0;right:0;top:0;height:54px;z-index:500;
  background:rgba(8,8,8,.96);backdrop-filter:blur(10px);
  border-bottom:.5px solid rgba(201,168,76,.14);
  align-items:center;justify-content:space-between;padding:0 1.2rem;
}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);letter-spacing:.1em;cursor:pointer}
.topbar-hbg{width:36px;height:36px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.topbar-hbg span{display:block;height:1.5px;background:var(--gold);transition:all .3s}
.topbar-hbg span:nth-child(1){width:20px}
.topbar-hbg span:nth-child(2){width:14px}
.topbar-hbg span:nth-child(3){width:20px}
.topbar-hbg.on span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.topbar-hbg.on span:nth-child(2){opacity:0}
.topbar-hbg.on span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* mobile drawer */
.mob-drawer{
  position:fixed;left:0;top:54px;bottom:0;width:var(--drawer);
  background:var(--black-soft);border-right:.5px solid rgba(201,168,76,.14);
  z-index:499;transform:translateX(-100%);
  transition:transform .4s var(--ease);
  display:flex;flex-direction:column;padding:1.5rem 1rem;gap:.35rem;
}
.mob-drawer.open{transform:translateX(0)}
.mob-overlay{
  position:fixed;inset:0;top:54px;background:rgba(0,0,0,.6);
  z-index:498;opacity:0;pointer-events:none;transition:opacity .3s;
}
.mob-overlay.show{opacity:1;pointer-events:auto}
.mob-socials{display:flex;gap:.8rem;margin-top:auto;padding:.5rem 0}

/* ─── RESPONSIVE SWITCH ─── */
@media(max-width:768px){
  .topbar{display:flex}
  .rail{display:none}
  .main.shifted{margin-left:0}
  .main{padding-top:54px}
}
@media(min-width:769px){
  .mob-drawer,.mob-overlay,.topbar{display:none !important}
}

/* ─── PREMIUM SCROLL PROGRESS BAR ─── */
#scroll-bar{position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));width:0%;z-index:9998;transition:width .05s linear;box-shadow:0 0 8px rgba(201,168,76,.6)}

/* ─── NOISE OVERLAY ─── */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");opacity:.022;pointer-events:none;z-index:9997;mix-blend-mode:overlay}

/* ─── AMBIENT 3D CANVAS ─── */
#ambient-canvas{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.55}

/* ─── ANIMATIONS ─── */
@keyframes fadeSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes growLine{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
@keyframes cube{0%{transform:rotateX(0) rotateY(0)}100%{transform:rotateX(360deg) rotateY(360deg)}}
@keyframes wapulse{0%,100%{box-shadow:0 4px 18px rgba(37,211,102,.4)}50%{box-shadow:0 4px 26px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.08)}}
@keyframes floatup{0%{opacity:0;transform:translateY(0) translateX(0)}10%{opacity:.32}90%{opacity:.07}100%{opacity:0;transform:translateY(-100vh) translateX(var(--drift))}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes borderGlow{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0)}50%{box-shadow:0 0 20px 2px rgba(201,168,76,.18)}}
@keyframes lineGrow{from{transform:scaleX(0);transform-origin:left}to{transform:scaleX(1)}}

.page{animation:fadeSlide .42s ease}

/* ─── PREMIUM REVEAL SYSTEM ─── */
.reveal{opacity:0;transform:translateY(36px);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal.in{opacity:1;transform:none}
.reveal-left{opacity:0;transform:translateX(-48px);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal-left.in{opacity:1;transform:none}
.reveal-right{opacity:0;transform:translateX(48px);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal-right.in{opacity:1;transform:none}
.reveal-scale{opacity:0;transform:scale(0.92);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal-scale.in{opacity:1;transform:scale(1)}

/* ─── GOLD SHIMMER TEXT ─── */
.shimmer-text{background:linear-gradient(90deg,var(--gold) 0%,var(--gold-light) 40%,#FFF8E1 50%,var(--gold-light) 60%,var(--gold) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite}

/* ─── STAT COUNTER ANIMATION ─── */
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--gold);line-height:1;transition:transform .3s}
.stat-c:hover .stat-n{transform:scale(1.08)}

/* ─── MAGNETIC BUTTONS ─── */
.btn-gold,.btn-outline,.h-cta{transition:background .3s,color .3s,transform .2s,box-shadow .3s}
.btn-gold:hover{box-shadow:0 8px 32px rgba(201,168,76,.35)}
.btn-outline:hover{box-shadow:0 8px 32px rgba(201,168,76,.2)}

/* ─── SECTION DIVIDER LINES ─── */
.gold-rule{width:48px;height:1px;background:var(--gold);margin:1.2rem 0;display:block}
.gold-rule.center{margin:1.2rem auto}

/* ─── PARALLAX LAYERS ─── */
.parallax-slow{will-change:transform}
.parallax-mid{will-change:transform}

/* ─── HERO ENHANCEMENTS ─── */
.hero-content{position:relative;z-index:2;text-align:center;padding:0 1.5rem}
.h-tag{font-size:.58rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);margin-bottom:1.3rem;animation:up .9s .4s both}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,6.5rem);font-weight:300;line-height:1.05;margin-bottom:1.6rem;animation:up .9s .7s both}
.h-title em{font-style:italic;color:var(--gold)}
.h-sub{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);margin-bottom:2.5rem;animation:up .9s 1s both}
.h-cta{display:inline-flex;align-items:center;gap:.8rem;border:1px solid var(--gold);padding:.85rem 2rem;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);cursor:pointer;background:none;animation:up .9s 1.3s both;font-family:'Montserrat',sans-serif;position:relative;overflow:hidden}
.h-cta::before{content:'';position:absolute;inset:0;background:var(--gold);transform:translateX(-100%);transition:transform .4s cubic-bezier(0.16,1,0.3,1);z-index:-1}
.h-cta:hover::before{transform:translateX(0)}
.h-cta:hover{color:var(--black)}
.h-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;font-size:.48rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(245,240,232,.32)}
.h-scroll-line{width:1px;height:34px;background:linear-gradient(180deg,var(--gold),transparent);animation:growLine 1.6s infinite}
/* Hero corner ornaments */
.hero-corner{position:absolute;z-index:3;width:40px;height:40px;opacity:.35}
.hero-corner.tl{top:2rem;left:2rem;border-top:1px solid var(--gold);border-left:1px solid var(--gold)}
.hero-corner.tr{top:2rem;right:2rem;border-top:1px solid var(--gold);border-right:1px solid var(--gold)}
.hero-corner.bl{bottom:4rem;left:2rem;border-bottom:1px solid var(--gold);border-left:1px solid var(--gold)}
.hero-corner.br{bottom:4rem;right:2rem;border-bottom:1px solid var(--gold);border-right:1px solid var(--gold)}
@media(max-width:540px){.h-title{font-size:2.6rem}.h-sub{font-size:.58rem}.hero-corner{width:24px;height:24px}}

/* ─── SECTION TITLE UPGRADE ─── */
.sec-lbl{font-size:.56rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:.7rem;display:flex;align-items:center;gap:.8rem}
.sec-lbl::before{content:'';display:inline-block;width:20px;height:.5px;background:var(--gold)}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,3.5vw,3rem);font-weight:300;line-height:1.2;margin-bottom:1.1rem}
.sec-title em{font-style:italic;color:var(--gold)}

/* ─── SERVICE CARD UPGRADE ─── */
.svc-card{border:.5px solid rgba(201,168,76,.11);padding:2rem;background:var(--black-card);cursor:pointer;transition:transform .5s cubic-bezier(0.16,1,0.3,1),border-color .3s,box-shadow .4s;position:relative;overflow:hidden}
.svc-card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at center,rgba(201,168,76,.06) 0%,transparent 60%);opacity:0;transition:opacity .5s;pointer-events:none}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transition:width .5s}
.svc-card:hover{transform:translateY(-8px) scale(1.01);border-color:rgba(201,168,76,.45);box-shadow:0 24px 48px rgba(0,0,0,.5),0 0 0 .5px rgba(201,168,76,.15)}
.svc-card:hover::before{opacity:1}
.svc-card:hover::after{width:100%}

/* ─── STAT CARD UPGRADE ─── */
.stat-c{border:.5px solid rgba(201,168,76,.14);padding:1.7rem;text-align:center;background:var(--black-card);position:relative;overflow:hidden;transition:border-color .4s,transform .4s cubic-bezier(0.16,1,0.3,1),box-shadow .4s}
.stat-c::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.07),transparent);opacity:0;transition:opacity .4s}
.stat-c::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:0;height:1px;background:var(--gold);transition:width .4s}
.stat-c:hover::before{opacity:1}
.stat-c:hover::after{width:80%}
.stat-c:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 16px 40px rgba(0,0,0,.4)}

/* ─── PROJECT CARD UPGRADE ─── */
.proj-card{border:.5px solid rgba(201,168,76,.1);overflow:hidden;cursor:pointer;transition:border-color .4s,transform .5s cubic-bezier(0.16,1,0.3,1),box-shadow .4s;position:relative;background:var(--black-card)}
.proj-card:hover{border-color:rgba(201,168,76,.5);transform:translateY(-6px);box-shadow:0 20px 50px rgba(0,0,0,.6)}

/* ─── MARQUEE UPGRADE ─── */
.mq-wrap{overflow:hidden;border-top:.5px solid rgba(201,168,76,.14);border-bottom:.5px solid rgba(201,168,76,.14);padding:1rem 0;background:var(--black-mid);position:relative}
.mq-wrap::before,.mq-wrap::after{content:'';position:absolute;top:0;bottom:0;width:80px;z-index:2;pointer-events:none}
.mq-wrap::before{left:0;background:linear-gradient(90deg,var(--black-mid),transparent)}
.mq-wrap::after{right:0;background:linear-gradient(-90deg,var(--black-mid),transparent)}
.mq-track{display:flex;gap:3rem;animation:marquee 28s linear infinite;white-space:nowrap;width:max-content}
.mq-item{font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.62);display:flex;align-items:center;gap:.7rem;transition:color .3s}
.mq-item::after{content:'◆';font-size:.32rem;color:var(--gold)}

/* ─── CURSOR UPGRADE ─── */
.cur,.cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.cur{width:6px;height:6px;background:var(--gold);transition:transform .08s,width .2s,height .2s;mix-blend-mode:difference}
.cur-ring{width:36px;height:36px;border:1px solid rgba(201,168,76,.6);opacity:.7;transition:width .35s cubic-bezier(0.16,1,0.3,1),height .35s cubic-bezier(0.16,1,0.3,1),opacity .35s,left .12s,top .12s}
.cur-ring.big{width:64px;height:64px;opacity:.25;border-color:var(--gold)}
.cur-ring.clicking{width:20px;height:20px;opacity:.9}
@media(hover:none){.cur,.cur-ring{display:none}body{cursor:auto}}

/* ─── SECTIONS ─── */
.sec{padding:6rem 4rem}
@media(max-width:768px){.sec{padding:4rem 1.5rem}}

/* ─── ABOUT ─── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
@media(max-width:880px){.about-grid{grid-template-columns:1fr;gap:3rem}}
.about-p{font-size:.8rem;line-height:2;color:var(--gray);margin-bottom:1.1rem}
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.stat-l{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.42);margin-top:.4rem}

/* ─── SERVICES ─── */
.svc-bg{background:var(--black-mid)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin-top:3rem}
@media(max-width:880px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.svc-grid{grid-template-columns:1fr}}
.svc-icon{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:rgba(201,168,76,.17);margin-bottom:1.1rem;line-height:1;transition:color .4s,transform .4s}
.svc-card:hover .svc-icon{color:rgba(201,168,76,.55);transform:scale(1.1) translateY(-2px)}
.svc-name{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.7rem}
.svc-desc{font-size:.72rem;line-height:1.8;color:var(--gray)}

/* ─── FAQ ─── */
.faq-sec{background:var(--black-mid);position:relative;overflow:hidden}
.faq-sec::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.045),transparent 42%);pointer-events:none}
.faq-head{position:relative;max-width:620px;margin-bottom:2.8rem}
.faq-grid{position:relative;display:grid;grid-template-columns:minmax(220px,.72fr) 1.28fr;gap:3rem;align-items:start}
.faq-note{border-left:1px solid rgba(201,168,76,.42);padding-left:1.4rem;color:var(--gray);font-size:.78rem;line-height:1.9}
.faq-list{display:flex;flex-direction:column;border-top:.5px solid rgba(201,168,76,.16)}
.faq-item{border-bottom:.5px solid rgba(201,168,76,.16)}
.faq-item-hdr{display:grid;grid-template-columns:64px 1fr auto;gap:1.3rem;padding:1.45rem 0;cursor:pointer;align-items:center;transition:opacity .2s}
.faq-item-hdr:hover{opacity:.85}
.faq-num{font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.62);font-size:1.3rem;line-height:1}
.faq-q{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--white);line-height:1.55}
.faq-chevron{width:18px;height:18px;flex-shrink:0;transition:transform .35s var(--ease);color:rgba(201,168,76,.5)}
.faq-chevron.open{transform:rotate(180deg)}

.sum-line{display:flex;justify-content:space-between;align-items:center;padding:.55rem 0;border-bottom:.5px solid rgba(201,168,76,.07);font-size:.64rem;color:var(--gray)}
.sum-line:last-child{border-bottom:none}
.sum-line strong{color:var(--white);font-weight:400}
.sum-line.sub-item{padding-left:.8rem;opacity:.8}
.sum-total{margin:1rem 1.6rem 0;border-top:.5px solid rgba(201,168,76,.3);padding:1rem 0;display:flex;justify-content:space-between;align-items:baseline}
.sum-total-lbl{font-size:.56rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
.sum-total-val{font-family:'Cormorant Garamond',serif;font-size:2rem;color:var(--gold);line-height:1}
.sum-note{margin:0 1.6rem;padding:.6rem .8rem;background:rgba(201,168,76,.04);border-left:2px solid rgba(201,168,76,.3);font-size:.6rem;color:rgba(245,240,232,.4);line-height:1.65}
.sum-actions{padding:1.4rem 1.6rem;display:flex;flex-direction:column;gap:.75rem}
.sum-disclaimer{font-size:.56rem;color:rgba(245,240,232,.26);line-height:1.7;text-align:center;padding:.5rem 1.6rem 1.4rem}
.calc-empty{text-align:center;padding:3rem;color:rgba(245,240,232,.25);font-family:'Cormorant Garamond',serif;font-size:1.1rem}

/* ─── 3D VISUALIZER ─── */
.viz-page{background:var(--black);min-height:100vh}
.viz-tabs{display:flex;gap:0;border-bottom:.5px solid rgba(201,168,76,.16);overflow-x:auto;scrollbar-width:none;background:var(--black-mid)}
.viz-tabs::-webkit-scrollbar{display:none}
.viz-tab{flex-shrink:0;padding:.9rem 2rem;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'Montserrat',sans-serif;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:rgba(245,240,232,.38);transition:color .25s,border-color .25s;white-space:nowrap}
.viz-tab:hover{color:var(--white)}
.viz-tab.on{color:var(--gold);border-bottom-color:var(--gold)}
.viz-layout{display:grid;grid-template-columns:1fr 300px;height:calc(100vh - 54px - 110px);min-height:520px}
@media(max-width:900px){.viz-layout{grid-template-columns:1fr;height:auto}}
.viz-canvas-wrap{position:relative;background:var(--black);overflow:hidden;cursor:grab}
.viz-canvas-wrap:active{cursor:grabbing}
.viz-canvas-wrap canvas{display:block;width:100%!important;height:100%!important}
.viz-hint{position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(201,168,76,.35);pointer-events:none;white-space:nowrap;background:rgba(8,8,8,.6);padding:.4rem .9rem;border:.5px solid rgba(201,168,76,.12);backdrop-filter:blur(4px)}
.viz-controls{background:var(--black-mid);border-left:.5px solid rgba(201,168,76,.13);overflow-y:auto;display:flex;flex-direction:column}
@media(max-width:900px){.viz-controls{border-left:none;border-top:.5px solid rgba(201,168,76,.13);max-height:380px}}
.viz-ctrl-head{padding:1.2rem 1.4rem .8rem;border-bottom:.5px solid rgba(201,168,76,.1)}
.viz-ctrl-head-lbl{font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(201,168,76,.55);margin-bottom:.2rem}
.viz-ctrl-head-title{font-family:'Cormorant Garamond',serif;font-size:1.15rem;color:var(--white)}
.viz-ctrl-body{padding:.8rem 1.4rem;display:flex;flex-direction:column;gap:1.1rem;flex:1}
.viz-group{display:flex;flex-direction:column;gap:.45rem}
.viz-group-lbl{font-size:.48rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(201,168,76,.5)}
.viz-chips{display:flex;flex-wrap:wrap;gap:.38rem}
.viz-chip{padding:.3rem .75rem;border:.5px solid rgba(201,168,76,.18);background:none;color:rgba(245,240,232,.42);font-family:'Montserrat',sans-serif;font-size:.5rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .22s;border-radius:2px}
.viz-chip:hover{border-color:rgba(201,168,76,.45);color:var(--white)}
.viz-chip.on{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}
.viz-swatch-row{display:flex;flex-wrap:wrap;gap:.4rem;max-height:140px;overflow-y:auto;padding:.2rem .1rem .4rem;scrollbar-width:thin;scrollbar-color:rgba(201,168,76,.3) transparent}
.viz-swatch-row::-webkit-scrollbar{width:3px}
.viz-swatch-row::-webkit-scrollbar-thumb{background:rgba(201,168,76,.3);border-radius:2px}
.viz-swatch{width:26px;height:26px;border-radius:3px;cursor:pointer;border:2px solid transparent;transition:transform .2s,border-color .2s;position:relative;flex-shrink:0}
.viz-swatch:hover{transform:scale(1.2);z-index:10}
.viz-swatch:hover::after{content:attr(title);position:absolute;bottom:calc(100% + 5px);left:50%;transform:translateX(-50%);background:rgba(8,8,8,.92);color:var(--gold);font-family:'Montserrat',sans-serif;font-size:.42rem;letter-spacing:.1em;white-space:nowrap;padding:.25rem .5rem;border:.5px solid rgba(201,168,76,.3);pointer-events:none;z-index:20;border-radius:2px}
.viz-swatch.on{border-color:var(--gold);transform:scale(1.12)}
.viz-swatch-label{display:none}
.viz-slider-row{display:flex;align-items:center;gap:.8rem}
.viz-slider-val{font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);min-width:2.5rem;text-align:right}
.viz-ctrl-footer{padding:1rem 1.4rem 1.4rem;border-top:.5px solid rgba(201,168,76,.1);display:flex;flex-direction:column;gap:.6rem;margin-top:auto}
.viz-reset{background:none;border:.5px solid rgba(201,168,76,.2);color:rgba(245,240,232,.35);padding:.5rem;font-family:'Montserrat',sans-serif;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .25s;width:100%}
.viz-reset:hover{border-color:var(--gold);color:var(--gold)}
/* ══════════════════════════════════════
   PREMIUM UPGRADE — SCROLL 3D & LUXURY
══════════════════════════════════════ */

/* ─── SCROLL 3D CANVAS (fixed bg) ─── */
#scroll-canvas{
  position:fixed;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
  opacity:0.55;
}

/* Make all page content sit above canvas */
.main > *{position:relative;z-index:1}
.rail{z-index:500}
.topbar{z-index:500}

/* ─── PREMIUM REVEAL ANIMATIONS ─── */
.reveal{
  opacity:0;
  transform:translateY(40px);
  transition:opacity .9s cubic-bezier(0.16,1,0.3,1), transform .9s cubic-bezier(0.16,1,0.3,1);
}
.reveal.in{opacity:1;transform:none}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal-left.in{opacity:1;transform:none}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal-right.in{opacity:1;transform:none}
.reveal-scale{opacity:0;transform:scale(0.92);transition:opacity .9s cubic-bezier(0.16,1,0.3,1),transform .9s cubic-bezier(0.16,1,0.3,1)}
.reveal-scale.in{opacity:1;transform:scale(1)}

/* ─── PREMIUM HERO UPGRADES ─── */
.hero{position:relative;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero::after{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 60%, rgba(201,168,76,0.07) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 80% 30%, rgba(201,168,76,0.04) 0%, transparent 65%);
  pointer-events:none;z-index:2;
  animation:heroGlow 8s ease-in-out infinite alternate;
}
@keyframes heroGlow{
  0%{opacity:.6}100%{opacity:1}
}
.h-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,8vw,6.5rem);
  font-weight:300;line-height:1.05;margin-bottom:1.6rem;
  animation:up .9s .7s both;
  text-shadow:0 2px 40px rgba(0,0,0,0.6);
}
.h-title em{font-style:italic;color:var(--gold);text-shadow:0 0 60px rgba(201,168,76,0.3)}

/* Animated line under hero tag */
.h-tag{position:relative;display:inline-block}
.h-tag::after{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  width:0;height:.5px;background:var(--gold);
  animation:tagLine 1.2s 1s forwards;
}
@keyframes tagLine{to{width:100%}}

/* ─── GOLD DIVIDER LINE ─── */
.gold-divider{
  width:100%;height:.5px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.5),transparent);
  margin:0;
}

/* ─── STAT COUNTER UPGRADE ─── */
.stat-c{
  border:.5px solid rgba(201,168,76,.14);padding:1.7rem;text-align:center;
  background:var(--black-card);position:relative;overflow:hidden;
  transition:border-color .4s,transform .4s cubic-bezier(0.16,1,0.3,1),box-shadow .4s;
}
.stat-c::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,168,76,.06),transparent);
  opacity:0;transition:opacity .4s;
}
.stat-c::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:transform .5s cubic-bezier(0.16,1,0.3,1);
}
.stat-c:hover{border-color:rgba(201,168,76,.5);transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,0.4),0 0 0 .5px rgba(201,168,76,.1)}
.stat-c:hover::before{opacity:1}
.stat-c:hover::after{transform:scaleX(1)}

/* ─── SERVICE CARD UPGRADE ─── */
.svc-card{
  border:.5px solid rgba(201,168,76,.11);padding:2rem;background:var(--black-card);
  cursor:pointer;position:relative;overflow:hidden;
  transition:transform .5s cubic-bezier(0.16,1,0.3,1),border-color .4s,box-shadow .4s;
}
.svc-card::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 120%,rgba(201,168,76,.09),transparent 65%);
  opacity:0;transition:opacity .4s;
}
.svc-card:hover{transform:translateY(-7px);border-color:rgba(201,168,76,.5);box-shadow:0 20px 50px rgba(0,0,0,0.5)}
.svc-card:hover::before{opacity:1}
.svc-icon{
  font-family:'Cormorant Garamond',serif;font-size:2.4rem;
  color:rgba(201,168,76,.17);margin-bottom:1.1rem;line-height:1;
  transition:color .4s,transform .4s cubic-bezier(0.16,1,0.3,1);
}
.svc-card:hover .svc-icon{color:rgba(201,168,76,.55);transform:scale(1.08) translateY(-2px)}

/* ─── PARALLAX SECTION TITLES ─── */
.sec-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(1.7rem,3.5vw,3rem);
  font-weight:300;line-height:1.2;margin-bottom:1.1rem;
  background:linear-gradient(135deg, var(--white) 0%, rgba(245,240,232,.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.sec-title em{font-style:italic;-webkit-text-fill-color:var(--gold);background:none}

/* ─── PREMIUM MARQUEE ─── */
.mq-wrap{
  overflow:hidden;padding:1.1rem 0;
  background:linear-gradient(90deg,var(--black) 0%,var(--black-mid) 50%,var(--black) 100%);
  border-top:.5px solid rgba(201,168,76,.18);
  border-bottom:.5px solid rgba(201,168,76,.18);
  position:relative;
}
.mq-wrap::before,.mq-wrap::after{
  content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none;
}
.mq-wrap::before{left:0;background:linear-gradient(90deg,var(--black),transparent)}
.mq-wrap::after{right:0;background:linear-gradient(270deg,var(--black),transparent)}

/* ─── GLASS CARD EFFECT (about section) ─── */
.about-glass{
  background:rgba(20,20,20,.6);
  border:.5px solid rgba(201,168,76,.15);
  backdrop-filter:blur(20px);
  padding:2.5rem;
  position:relative;overflow:hidden;
}
.about-glass::before{
  content:'';position:absolute;top:0;left:0;right:0;height:.5px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.5),transparent);
}

/* ─── HORIZONTAL SCROLL NUMBER COUNTER ─── */
@keyframes countUp{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:none}}
.stat-n{
  font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;
  color:var(--gold);line-height:1;
  transition:transform .3s;
}

/* ─── PREMIUM CURSOR UPGRADE ─── */
.cur{
  width:7px;height:7px;background:var(--gold);
  transition:transform .08s,width .3s,height .3s,background .3s;
  mix-blend-mode:difference;
}
.cur.hovering{width:5px;height:5px;background:var(--white)}
.cur-ring{
  width:34px;height:34px;border:1px solid rgba(201,168,76,.6);
  transition:width .35s cubic-bezier(0.16,1,0.3,1),height .35s cubic-bezier(0.16,1,0.3,1),
             opacity .35s,left .1s,top .1s,border-color .3s;
}
.cur-ring.hovering{width:50px;height:50px;border-color:rgba(201,168,76,.3)}

/* ─── SECTION BACKGROUND DEPTH ─── */
.sec{padding:7rem 4rem;position:relative}
@media(max-width:768px){.sec{padding:4.5rem 1.5rem}}

/* ─── PREMIUM BUTTON STATES ─── */
.btn-gold{
  position:relative;overflow:hidden;
  display:inline-flex;align-items:center;gap:.6rem;
  background:var(--gold);color:var(--black);
  padding:.9rem 2.4rem;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
  font-weight:500;cursor:pointer;border:none;
  font-family:'Montserrat',sans-serif;
  transition:background .3s,transform .25s cubic-bezier(0.16,1,0.3,1),box-shadow .3s;
}
.btn-gold::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%) skewX(-15deg);
  transition:transform .5s cubic-bezier(0.16,1,0.3,1);
}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.4)}
.btn-gold:hover::before{transform:translateX(200%) skewX(-15deg)}
.btn-outline{
  display:inline-flex;align-items:center;gap:.6rem;
  border:1px solid rgba(201,168,76,.6);color:var(--gold);
  padding:.9rem 2.4rem;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
  cursor:pointer;background:none;
  transition:background .3s,color .3s,transform .25s cubic-bezier(0.16,1,0.3,1),border-color .3s,box-shadow .3s;
  font-family:'Montserrat',sans-serif;font-weight:300;text-decoration:none;
  position:relative;overflow:hidden;
}
.btn-outline::before{
  content:'';position:absolute;inset:0;background:var(--gold);
  transform:scaleX(0);transform-origin:left;
  transition:transform .4s cubic-bezier(0.16,1,0.3,1);
}
.btn-outline:hover{color:var(--black);border-color:var(--gold);transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,168,76,.2)}
.btn-outline:hover::before{transform:scaleX(1)}
.btn-outline:hover span,.btn-outline:hover{z-index:1}
.btn-outline > *{position:relative;z-index:1}

/* ─── SCROLL PROGRESS BAR ─── */
.scroll-progress{
  position:fixed;top:0;left:0;height:1.5px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light));
  z-index:9998;width:0%;
  transition:width .1s linear;
  box-shadow:0 0 8px rgba(201,168,76,.6);
}
@media(max-width:768px){.scroll-progress{top:54px}}

/* ─── FLOATING GOLD ORBS ─── */
.orb{
  position:fixed;border-radius:50%;pointer-events:none;z-index:0;
  background:radial-gradient(circle,rgba(201,168,76,0.08) 0%,transparent 70%);
  animation:orbFloat var(--orb-dur) ease-in-out infinite alternate;
}
@keyframes orbFloat{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(var(--orb-dx),var(--orb-dy)) scale(1.1)}
}

/* ─── PREMIUM SECTION LABEL ─── */
.sec-lbl{
  font-size:.54rem;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold);margin-bottom:.8rem;
  position:relative;display:inline-block;
}
.sec-lbl::before{
  content:'';position:absolute;left:-1.2rem;top:50%;transform:translateY(-50%);
  width:.5rem;height:.5px;background:var(--gold);opacity:.7;
}

/* ─── ABOUT SECTION PREMIUM ─── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:6rem;align-items:center}
@media(max-width:880px){.about-grid{grid-template-columns:1fr;gap:3rem}}
.about-p{font-size:.82rem;line-height:2.1;color:var(--gray);margin-bottom:1.2rem}

/* ─── COUNTER ANIMATION ─── */
.stat-n.counting{animation:countPop .4s cubic-bezier(0.16,1,0.3,1)}
@keyframes countPop{0%{transform:scale(0.8)}60%{transform:scale(1.05)}100%{transform:scale(1)}}

/* ─── PROCESS STEP PREMIUM ─── */
.process-step{
  display:flex;gap:1.4rem;align-items:flex-start;
  padding:1rem 1rem 1rem 0;
  border-left:1px solid rgba(201,168,76,.08);
  padding-left:1.2rem;margin-left:.2rem;
  transition:border-color .4s;
  position:relative;
}
.process-step::before{
  content:'';position:absolute;left:-1px;top:0;height:0;width:1px;
  background:var(--gold);
  transition:height .6s cubic-bezier(0.16,1,0.3,1);
}
.process-step.in::before{height:100%}
.process-step:hover{border-color:rgba(201,168,76,.3)}

/* ─── GOLD LINE SEPARATOR ─── */
.gold-sep{
  width:60px;height:.5px;background:var(--gold);
  margin:1.2rem 0;opacity:.6;
}

/* ─── CTA PREMIUM ─── */
.cta-sec{
  text-align:center;position:relative;overflow:hidden;padding:8rem 4rem;
  background:var(--black-mid);
}
.cta-sec::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 70% 60% at 50% 50%,rgba(201,168,76,.08),transparent 65%),
    radial-gradient(ellipse 40% 40% at 20% 80%,rgba(201,168,76,.04),transparent 60%);
  pointer-events:none;animation:ctaGlow 6s ease-in-out infinite alternate;
}
@keyframes ctaGlow{0%{opacity:.7}100%{opacity:1}}
.cta-sec::after{
  content:'';position:absolute;top:0;left:10%;right:10%;height:.5px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.4),transparent);
}

/* ─── FOOTER PREMIUM ─── */
footer{
  background:linear-gradient(180deg,var(--black-mid) 0%,var(--black) 100%);
  border-top:.5px solid rgba(201,168,76,.18);padding:4rem 4rem 2.5rem;
  position:relative;
}
footer::before{
  content:'';position:absolute;top:0;left:5%;right:5%;height:.5px;
  background:linear-gradient(90deg,transparent,rgba(201,168,76,.35),transparent);
}

/* ─── SMOOTH PAGE TRANSITIONS ─── */
.page{animation:pageIn .55s cubic-bezier(0.16,1,0.3,1)}
@keyframes pageIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ─── PREMIUM SCROLLBAR ─── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:rgba(201,168,76,.4);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--gold)}

/* ─── NOISE TEXTURE OVERLAY ─── */
body::after{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9997;opacity:.4;
}

/* keep back button etc above noise */
.back-bar,.wa-fab,.cur,.cur-ring,.scroll-progress{z-index:9998}

.back-btn{
  display:inline-flex;align-items:center;gap:.55rem;
  background:none;border:none;cursor:pointer;
  color:rgba(201,168,76,.65);
  font-family:'Montserrat',sans-serif;font-size:.54rem;letter-spacing:.22em;text-transform:uppercase;
  padding:.7rem 1.1rem .7rem 0;
  transition:color .25s,gap .25s;
  position:relative;
}
.back-btn::before{
  content:'';position:absolute;bottom:0;left:0;width:0;height:.5px;
  background:var(--gold);transition:width .3s var(--ease);
}
.back-btn:hover{color:var(--gold);gap:.8rem}
.back-btn:hover::before{width:100%}
.back-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;transition:transform .25s var(--ease)}
.back-btn:hover svg{transform:translateX(-3px)}
.back-bar{
  padding:1.4rem 4rem .2rem;
  border-bottom:.5px solid rgba(201,168,76,.07);
  background:var(--black);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(12px);
  background:rgba(8,8,8,.88);
}
@media(max-width:768px){.back-bar{padding:1rem 1.5rem .3rem}}

/* ── CURSOR ── */
function Cursor() {
  const curRef  = useRef(null);
  const ringRef = useRef(null);
  useEffect(() => {
    let mx=0,my=0,rx=0,ry=0;
    const onMove = e => {
      mx=e.clientX; my=e.clientY;
      if(curRef.current){ curRef.current.style.left=mx+'px'; curRef.current.style.top=my+'px'; }
    };
    // Smooth ring follow
    let raf;
    const lerp=(a,b,t)=>a+(b-a)*t;
    const loop=()=>{
      rx=lerp(rx,mx,0.14); ry=lerp(ry,my,0.14);
      if(ringRef.current){ ringRef.current.style.left=rx+'px'; ringRef.current.style.top=ry+'px'; }
      raf=requestAnimationFrame(loop);
    };
    loop();
    const onOver = e => {
      const t = e.target.closest('button,a,.svc-card,.proj-card,.cat-card,.stat-c,.viz-chip,.chip,.flt-btn');
      if(t && ringRef.current) ringRef.current.classList.add('big');
      else if(ringRef.current) ringRef.current.classList.remove('big');
    };
    const onDown = ()=>{ if(ringRef.current) ringRef.current.classList.add('clicking'); };
    const onUp   = ()=>{ if(ringRef.current) ringRef.current.classList.remove('clicking'); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseover', onOver);
    document.addEventListener('mousedown', onDown);
    document.addEventListener('mouseup',   onUp);
    return ()=>{
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseover', onOver);
      document.removeEventListener('mousedown', onDown);
      document.removeEventListener('mouseup',   onUp);
      cancelAnimationFrame(raf);
    };
  }, []);
  return (
    React.createElement(React.Fragment, null,
      React.createElement('div', { className:'cur', ref:curRef }),
      React.createElement('div', { className:'cur-ring', ref:ringRef })
    )
  );
}

}

/* ── REVEAL HOOK ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal,.reveal-left,.reveal-right,.reveal-scale');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); },[]);
    }, {threshold:0.05, rootMargin:'0px 0px -20px 0px'});
    els.forEach(el => {
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.classList.add('in');
      } else {
        obs.observe(el);
      }
    });
    return () => obs.disconnect();
  });
}

/* ── PRICE CALCULATOR ── */
function PriceCalculator({setPage}) {
  useReveal();
  const [tab, setTab] = useState('kitchen');

  /* ── KITCHEN STATE ── */
  const [kSize,   setKSize]   = useState(10);
  const [kLayout, setKLayout] = useState('L-Shape');
  const [kShutter,setKShutter]= useState('Acrylic High-Gloss');
  const [kCounter,setKCounter]= useState('Quartz');
  const [kAppl,   setKAppl]   = useState([]);
  const [kCabinet,setKCabinet]= useState('18mm HDHMR');

  /* ── WARDROBE STATE ── */
  const [wWidth,  setWWidth]  = useState(6);
  const [wHeight, setWHeight] = useState(8);
  const [wType,   setWType]   = useState('Sliding');
  const [wFinish, setWFinish] = useState('Laminate');
  const [wAcc,    setWAcc]    = useState([]);

  /* ── VANITY STATE ── */
  const [vSize,   setVSize]   = useState('Single Sink');
  const [vFinish, setVFinish] = useState('High-Gloss Lacquer');
  const [vMirror, setVMirror] = useState('LED Backlit');
  const [vBasin,  setVBasin]  = useState('Under-mount');

  /* ── TV UNIT STATE ── */
  const [tWidth,  setTWidth]  = useState(8);
  const [tStyle,  setTStyle]  = useState('Full Wall');
  const [tFinish, setTFinish] = useState('Matte Laminate');
  const [tAcc,    setTAcc]    = useState([]);

  const toggleArr = (arr, setArr, val) =>
    setArr(arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val]);

  /* ── PRICE LOGIC ── */
  const calcKitchen = () => {
    const base = {
      'Straight': 45000, 'L-Shape': 55000, 'U-Shape': 75000,
      'Island': 95000, 'Parallel': 65000
    }[kLayout] || 55000;
    const shutterMult = {
      'Acrylic High-Gloss':1.0,'Membrane':0.82,'PU Paint':1.15,
      'Veneer':1.25,'Laminate':0.75,'Lacquered Glass':1.35
    }[kShutter] || 1;
    const counterAdd = {
      'Quartz':18000,'Granite':14000,'Marble':22000,
      'Compact Laminate':9000,'Corian':16000
    }[kCounter] || 14000;
    const cabinetMult = {'18mm HDHMR':1.0,'18mm BWR Plywood':1.12,'Marine Plywood':1.22}[kCabinet]||1;
    const applAdd = kAppl.length * 8000;
    return Math.round((base * kSize * shutterMult * cabinetMult + counterAdd + applAdd) / 1000) * 1000;
  };

  const calcWardrobe = () => {
    const sqft = wWidth * wHeight;
    const base = {'Sliding':950,'Hinged':820,'Walk-in Open':780,'Pocket':1050}[wType]||900;
    const finMult = {'Laminate':1.0,'Veneer':1.25,'PU Paint':1.18,'Acrylic':1.32,'Membrane':0.88}[wFinish]||1;
    const accAdd = wAcc.includes('LED Lighting')?6500:0
      + (wAcc.includes('Velvet Drawers')?4500:0)
      + (wAcc.includes('Shoe Racks')?3500:0)
      + (wAcc.includes('Mirror Panel')?5000:0)
      + (wAcc.includes('Trouser Pull-out')?3000:0);
    return Math.round((sqft * base * finMult + accAdd) / 500) * 500;
  };

  const calcVanity = () => {
    const base = {'Single Sink':48000,'Double Sink':78000,'Floating Vanity':55000,'Freestanding':65000}[vSize]||48000;
    const finMult = {'High-Gloss Lacquer':1.0,'Matte Lacquer':0.95,'Veneer':1.2,'Acrylic':1.1,'PU Paint':1.08}[vFinish]||1;

/* ─────────────────────────────────────────
   THREE.JS SCENE BUILDER HELPERS
───────────────────────────────────────── */
function makeBox(w,h,d,color,roughness=0.6,metalness=0){
  const geo = new THREE.BoxGeometry(w,h,d);
  const mat = new THREE.MeshStandardMaterial({color:new THREE.Color(color),roughness,metalness});
  return new THREE.Mesh(geo,mat);
}

function addEdges(mesh, color='#C9A84C', opacity=0.25){
  const edges = new THREE.EdgesGeometry(mesh.geometry);
  const line  = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({color,transparent:true,opacity}));
  mesh.add(line);
}

/* ─────────────────────────────────────────
   SCENE BUILDERS  (returns THREE.Group)
───────────────────────────────────────── */

function buildKitchen(opts){
  const {layout, shutterColor, counterColor, wallColor, size} = opts;
  const g   = new THREE.Group();
  const sc  = shutterColor;
  const cc  = counterColor;

  /* Cabinet dimensions (Three.js units; 1 unit ≈ 1 ft) */
  const cabW   = 0.58;   // one cabinet module width
  const cabGap = 0.02;   // gap between modules
  const modW   = cabW + cabGap;  // 0.60 per module
  const cabH   = 0.85;   // lower cabinet height
  const upperH = 0.65;   // upper cabinet height
  const depth  = 0.60;   // lower cabinet depth
  const uDepth = 0.35;   // upper cabinet depth

  /* Convert ft to Three.js scale: 1 ft → 0.30 units */
  const SCALE  = 0.30;

  /* How many total running feet → split across runs by layout */
  const totalFt = size;  // e.g. 10 ft

  /* Per-layout run lengths (in ft), distributed from totalFt */
  let runs = [];  // [{ftLen, x0, z0, rotY}]

  if(layout === 'Straight'){
    runs = [{ ft: totalFt, x0: 0, z0: -2.8, rotY: 0 }];
  } else if(layout === 'L-Shape'){
    const leg1 = Math.round(totalFt * 0.60);
    const leg2 = totalFt - leg1;
    runs = [
      { ft: leg1, x0:  0,   z0: -2.8, rotY: 0 },
      { ft: leg2, x0: -2.8, z0:  0,   rotY: Math.PI/2 },
    ];
  } else if(layout === 'U-Shape'){
    const back  = Math.round(totalFt * 0.45);
    const side  = Math.round((totalFt - back) / 2);
    const side2 = totalFt - back - side;
    runs = [
      { ft: back,  x0:  0,                z0: -2.8, rotY: 0 },
      { ft: side,  x0: -(back*SCALE/2 + side*SCALE/2 - 0.02), z0: -(2.8 - side*SCALE/2), rotY: Math.PI/2 },
      { ft: side2, x0:  (back*SCALE/2 + side2*SCALE/2 - 0.02), z0: -(2.8 - side2*SCALE/2), rotY: -Math.PI/2 },
    ];
  } else if(layout === 'Island'){
    const wall   = Math.round(totalFt * 0.55);
    const island = totalFt - wall;
    runs = [
      { ft: wall,   x0: 0, z0: -2.8, rotY: 0 },
      { ft: island, x0: 0, z0:  0.9, rotY: 0, isIsland: true },
    ];
  } else if(layout === 'Parallel'){
    const run1 = Math.round(totalFt * 0.55);
    const run2 = totalFt - run1;
    runs = [
      { ft: run1, x0: 0, z0: -2.8, rotY: 0 },
      { ft: run2, x0: 0, z0:  0.7, rotY: Math.PI },
    ];
  }

  /* Room walls — scale with size */
  const roomW = Math.max(6, totalFt * SCALE + 1.4);
  const roomD = layout === 'U-Shape' || layout === 'Parallel' ? 5.5 : 4.5;

  const floor = makeBox(roomW+2, 0.05, roomD+1, '#1A1A1A', 0.9);
  floor.position.set(0, -0.025, 0);
  g.add(floor);

  const bwall = makeBox(roomW+2, 3.5, 0.08, wallColor, 0.95);
  bwall.position.set(0, 1.75, -(roomD/2 + 0.5));
  g.add(bwall);

  if(layout === 'L-Shape' || layout === 'U-Shape'){
    const swall = makeBox(0.08, 3.5, roomD+1, wallColor, 0.95);
    swall.position.set(-(roomW/2 + 0.5), 1.75, 0);
    g.add(swall);
  }
  if(layout === 'U-Shape' || layout === 'Parallel'){
    const rwall = makeBox(0.08, 3.5, roomD+1, wallColor, 0.95);
    rwall.position.set((roomW/2 + 0.5), 1.75, 0);
    g.add(rwall);
  }

  /* Draw a single run of cabinets */
  function drawRun(ftLen, x0, z0, rotY, isIsland){
    const run     = new THREE.Group();
    const units3D = ftLen * SCALE;   // length in Three.js units
    const numCabs = Math.max(1, Math.round(units3D / modW));
    const totalW  = numCabs * modW;

    for(let i = 0; i < numCabs; i++){
      const cx = i * modW - totalW/2 + modW/2;

      /* Lower cabinet */
      const lc = makeBox(cabW, cabH, depth - cabGap, sc, 0.4);
      lc.position.set(cx, cabH/2, 0);
      addEdges(lc, '#C9A84C', 0.15);
      run.add(lc);

      /* Countertop slab */
      const ct = makeBox(modW, 0.04, depth + 0.04, cc, 0.3, 0.1);
      ct.position.set(cx, cabH + 0.02, 0);
      run.add(ct);

      /* Handle bar */
      const hnd = makeBox(cabW * 0.68, 0.022, 0.022, '#C9A84C', 0.2, 0.85);
      hnd.position.set(cx, cabH - 0.14, -depth/2 + 0.01);
      run.add(hnd);

      /* Upper cabinet (skip for island) */
      if(!isIsland){
        const uc = makeBox(cabW, upperH, uDepth - cabGap, sc, 0.4);
        uc.position.set(cx, cabH + 0.68 + upperH/2, -(depth - uDepth)/2);
        addEdges(uc, '#C9A84C', 0.12);
        run.add(uc);

        /* Upper handle */
        const uhnd = makeBox(cabW * 0.68, 0.022, 0.022, '#C9A84C', 0.2, 0.85);
        uhnd.position.set(cx, cabH + 0.68 + 0.1, -(depth - uDepth)/2 - uDepth/2 + 0.01);
        run.add(uhnd);
      }
    }

    /* Toe kick strip */
    const tk = makeBox(totalW, 0.10, depth, '#111111', 0.9);
    tk.position.set(0, 0.05, 0);
    run.add(tk);

    run.position.set(x0, 0, z0);
    run.rotation.y = rotY;
    return run;
  }

  runs.forEach(r => g.add(drawRun(r.ft, r.x0, r.z0, r.rotY, r.isIsland)));

  /* Chimney — positioned above back wall centre */
  const chim = makeBox(0.70, 0.9, 0.4, '#888888', 0.5, 0.3);
  chim.position.set(0, 2.3, -(roomD/2 + 0.48));
  g.add(chim);
  const chimTop = makeBox(0.82, 0.08, 0.46, '#555555', 0.4, 0.5);
  chimTop.position.set(0, 2.76, -(roomD/2 + 0.48));
  g.add(chimTop);

  return g;
}

function buildWardrobe(opts){
  const {doorType,finish,width,height,wallColor} = opts;
  const g = new THREE.Group();
  const w = 0.5+width*0.18; const h = 0.5+height*0.18;
  const d = 0.6;

  /* Floor */
  const floor = makeBox(10,0.05,8,'#1A1A1A',0.9);
  floor.position.set(0,-0.025,0); g.add(floor);
  const bwall = makeBox(10,4,0.1,wallColor,0.9);
  bwall.position.set(0,2,-4); g.add(bwall);
  const swall = makeBox(0.1,4,8,wallColor,0.9);
  swall.position.set(-5,2,0); g.add(swall);

  /* Carcass */
  const carcass = makeBox(w,h,d,'#D0C8BC',0.7);
  carcass.position.set(0,h/2,0);
  g.add(carcass);

  /* Shelves inside */
  for(let i=1;i<5;i++){
    const shelf = makeBox(w-0.04,0.022,d-0.06,'#C5BDB1',0.6);
    shelf.position.set(0, i*(h/5), 0);
    g.add(shelf);
  }

  /* Doors */
  const panels = doorType==='Sliding'?2 : doorType==='Hinged'?3 : doorType==='Pocket'?2 : 4;
  for(let i=0;i<panels;i++){
    const pw = (w-0.04)/panels;
    const door = makeBox(pw-0.015, h-0.04, 0.022, finish, 0.35);
    door.position.set(-w/2 + pw/2 + i*pw + 0.02, h/2, d/2+0.013);
    addEdges(door,'#C9A84C',0.18);
    /* Handle */
    const hnd = makeBox(0.015,0.18,0.025,'#C9A84C',0.15,0.85);
    const hx = doorType==='Hinged' ? (i%2===0 ? pw/2-0.04 : -pw/2+0.04) : 0;
    hnd.position.set(-w/2 + pw/2 + i*pw + 0.02 + hx, h/2, d/2+0.038);
    g.add(door); g.add(hnd);
  }

  /* Top panel */
  const top = makeBox(w,0.025,d,'#C5BDB1',0.6);
  top.position.set(0,h+0.012,0); g.add(top);

  /* LED strip */
  const led = makeBox(w-0.1,0.012,0.04,'#FFD97A',0.1,0.0);
  led.position.set(0,h+0.005,d/2-0.02); g.add(led);

  return g;
}

function buildVanity(opts){
  const {config,finish,wallColor} = opts;
  const g = new THREE.Group();
  const isDouble = config==='Double Sink';
  const w = isDouble?1.5:0.85; const h=0.48; const d=0.5;

  /* Floor + Walls */
  const floor = makeBox(8,0.05,6,'#E8E4DC',0.85);
  floor.position.set(0,-0.025,0); g.add(floor);
  const bwall = makeBox(8,3.5,0.1,wallColor,0.85);
  bwall.position.set(0,1.75,-3); g.add(bwall);

  /* Cabinet body */
  const cab = config==='Floating Vanity'||config==='Freestanding'
    ? makeBox(w,h,d,finish,0.35) : makeBox(w,h,d,finish,0.35);
  const yPos = config==='Floating Vanity' ? 0.35 : h/2;
  cab.position.set(0,yPos,0);
  addEdges(cab,'#C9A84C',0.18);
  g.add(cab);

  /* Doors */
  const doors = isDouble?2:1;
  for(let i=0;i<doors;i++){
    const dw = (w-0.03)/doors;
    const dr = makeBox(dw-0.01,h-0.06,0.02,finish,0.35);
    dr.position.set(-w/2+dw/2+i*dw+0.015,yPos,d/2+0.012);
    addEdges(dr,'#C9A84C',0.12);
    g.add(dr);
    const hnd = makeBox(dw*0.5,0.015,0.02,'#C9A84C',0.1,0.9);
    hnd.position.set(-w/2+dw/2+i*dw+0.015,yPos,d/2+0.025);
    g.add(hnd);
  }

  /* Countertop */
  const ct = makeBox(w+0.04,0.025,d+0.04,'#DEDAD4',0.25,0.1);
  ct.position.set(0,yPos+h/2+0.012,0); g.add(ct);

  /* Basin(s) */
  for(let i=0;i<doors;i++){
    const bw = isDouble?(w-0.05)/2:w-0.15;
    const basin = makeBox(bw,0.05,d*0.7,'#F5F2EE',0.15,0.05);
    basin.position.set(isDouble?(-w/2+(i+0.5)*(w/doors)):0, yPos+h/2+0.03, 0.02);
    g.add(basin);
    /* Tap */
    const tap = makeBox(0.02,0.18,0.02,'#C0C0C0',0.1,0.85);
    tap.position.set(isDouble?(-w/2+(i+0.5)*(w/doors)):0, yPos+h/2+0.12, -0.08);
    g.add(tap);
  }

  /* Mirror */
  const mir = makeBox(w+0.1,0.75,0.025,'#D0D8D8',0.05,0.1);
  mir.position.set(0,yPos+h/2+0.5,-0.01);
  /* LED strip around mirror */
  const mirLed = makeBox(w+0.12,0.012,0.012,'#FFE8A0',0.05,0);
  mirLed.position.set(0,yPos+h/2+0.885,0.01);
  g.add(mir); g.add(mirLed);

  return g;
}

function buildTVUnit(opts){
  const {style,finish,width,wallColor} = opts;
  const g = new THREE.Group();
  const w = 1.8+width*0.22; const h = 0.55; const d=0.42;

  /* Floor + Wall */
  const floor = makeBox(12,0.05,8,'#1A1A1A',0.9);
  floor.position.set(0,-0.025,0); g.add(floor);
  const bwall = makeBox(12,4,0.1,wallColor,0.9);
  bwall.position.set(0,2,-4); g.add(bwall);

  const isFullWall = style==='Full Wall';
  const totalW = isFullWall ? w+2.5 : w;

  /* Base unit */
  const base = makeBox(w, h, d, finish, 0.35);
  const baseY = style==='Floating Panel'?0.55:h/2;
  base.position.set(0, baseY, 0);
  addEdges(base,'#C9A84C',0.15);
  g.add(base);

  /* Cabinet doors on base */
  const segments = Math.floor(w/0.55);
  for(let i=0;i<segments;i++){
    const sw = (w-0.03)/segments;
    const dr = makeBox(sw-0.01,h-0.06,0.015,finish,0.35);
    dr.position.set(-w/2+sw/2+i*sw+0.015, baseY, d/2+0.01);
    addEdges(dr,'#C9A84C',0.1);
    g.add(dr);
    const hnd = makeBox(sw*0.45,0.012,0.015,'#C9A84C',0.1,0.9);
    hnd.position.set(-w/2+sw/2+i*sw+0.015, baseY, d/2+0.022);
    g.add(hnd);
  }

  /* Top panel / back panel for full wall */
  if(isFullWall){
    const backPanel = makeBox(totalW, 2.2, 0.06, finish, 0.45);
    backPanel.position.set(0, baseY+h/2+1.1, -d/2+0.03);
    addEdges(backPanel,'#C9A84C',0.1);
    g.add(backPanel);
    /* Floating shelves */
    for(let i=0;i<3;i++){
      const shelf = makeBox(0.55,0.025,d*0.7,finish,0.35);
      shelf.position.set(-totalW/2+0.32+i*(totalW/3), baseY+h/2+0.45+i*0.55, -d/2+0.18);
      g.add(shelf);
    }
  }

  /* TV screen */
  const tvW = Math.min(w*0.75,1.6);
  const tv = makeBox(tvW, tvW*0.57, 0.04,'#0A0A0A',0.9);
  tv.position.set(0, baseY+h/2+tvW*0.285+0.06, -d/2+0.08);
  g.add(tv);
  /* Screen glow */
  const screen = makeBox(tvW-0.04,tvW*0.57-0.04,0.01,'#1A2535',0.1,0);
  screen.position.set(0, baseY+h/2+tvW*0.285+0.06, -d/2+0.11);
  g.add(screen);
  /* TV stand / bezel */
  const bezel = makeBox(tvW+0.04,tvW*0.57+0.04,0.03,'#1A1A1A',0.8,0.3);
  bezel.position.set(0, baseY+h/2+tvW*0.285+0.06, -d/2+0.07);
  g.add(bezel);

  /* LED profile strip */
  const led = makeBox(w,0.008,0.015,'#FFD97A',0.05,0);
  led.position.set(0, baseY+h/2+0.006, d/2-0.01);
  g.add(led);

  return g;
}

/* ─────────────────────────────────────────
   THREE.JS CANVAS COMPONENT
───────────────────────────────────────── */
function ThreeCanvas({tab, opts}) {
  const mountRef   = useRef(null);
  const rendererRef= useRef(null);
  const sceneRef   = useRef(null);
  const groupRef   = useRef(null);
  const animRef    = useRef(null);

  /* Init renderer/camera/lights once */
  useEffect(() => {
    const el = mountRef.current;
    if (!el) return;

    const W = el.clientWidth  || 800;
    const H = el.clientHeight || 520;

    const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(W,H);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.1;
    el.appendChild(renderer.domElement);

    const scene  = new THREE.Scene();
    scene.background = new THREE.Color('#0C0C0C');
    scene.fog = new THREE.Fog('#0C0C0C',12,22);

    const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 50);
    camera.position.set(4,3,5);
    camera.lookAt(0,0.8,0);

    const ambient = new THREE.AmbientLight('#FFF8EE', 0.55);
    scene.add(ambient);
    const key = new THREE.DirectionalLight('#FFF8EE', 1.1);
    key.position.set(5,6,4); key.castShadow=true;
    key.shadow.mapSize.set(1024,1024);
    scene.add(key);
    const fill = new THREE.DirectionalLight('#C9A84C', 0.28);
    fill.position.set(-4,2,-2); scene.add(fill);
    const rim  = new THREE.DirectionalLight('#E0D0B0', 0.18);
    rim.position.set(0,4,-5);  scene.add(rim);

    const grid = new THREE.GridHelper(14,28,'#C9A84C','#1A1A1A');
    grid.material.opacity=0.18; grid.material.transparent=true;
    scene.add(grid);

    rendererRef.current = renderer;
    sceneRef.current    = scene;
    sceneRef.current._camera = camera;

    /* Orbit controls */
    let isDragging=false, prevX=0, prevY=0;
    let theta=0.55, phi=0.82, radius=7;
    const target = new THREE.Vector3(0,0.8,0);
    function updateCam(){
      camera.position.x = target.x + radius*Math.sin(phi)*Math.sin(theta);
      camera.position.y = target.y + radius*Math.cos(phi);
      camera.position.z = target.z + radius*Math.sin(phi)*Math.cos(theta);
      camera.lookAt(target);
    }
    updateCam();

    const onDown = e => { isDragging=true; prevX=e.clientX||(e.touches?.[0]?.clientX||0); prevY=e.clientY||(e.touches?.[0]?.clientY||0); };
    const onUp   = () => { isDragging=false; };
    const onMove = e => {
      if(!isDragging) return;
      const cx=e.clientX||(e.touches?.[0]?.clientX||0);
      const cy=e.clientY||(e.touches?.[0]?.clientY||0);
      theta -= (cx-prevX)*0.008;
      phi    = Math.max(0.15,Math.min(Math.PI*0.48,phi+(cy-prevY)*0.008));
      prevX=cx; prevY=cy; updateCam();
    };
    const onWheel = e => { radius=Math.max(2.5,Math.min(12,radius+e.deltaY*0.008)); updateCam(); };

    renderer.domElement.addEventListener('mousedown',  onDown);
    renderer.domElement.addEventListener('touchstart', onDown, {passive:true});
    window.addEventListener('mouseup',   onUp);
    window.addEventListener('touchend',  onUp);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('touchmove', onMove, {passive:true});
    renderer.domElement.addEventListener('wheel', onWheel, {passive:true});

    const onResize = () => {
      const W2=el.clientWidth, H2=el.clientHeight;
      renderer.setSize(W2,H2);
      camera.aspect=W2/H2; camera.updateProjectionMatrix();
    };
    window.addEventListener('resize', onResize);

    let animId;
    const animate = () => {
      animId=requestAnimationFrame(animate);
      renderer.render(scene, camera);
    };
    animate(); animRef.current=animId;

    return () => {
      cancelAnimationFrame(animId);
      renderer.domElement.removeEventListener('mousedown',  onDown);
      renderer.domElement.removeEventListener('touchstart', onDown);
      window.removeEventListener('mouseup',   onUp);
      window.removeEventListener('touchend',  onUp);
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('touchmove', onMove);
      renderer.domElement.removeEventListener('wheel', onWheel);
      window.removeEventListener('resize', onResize);
      renderer.dispose();
      if(el.contains(renderer.domElement)) el.removeChild(renderer.domElement);
    };
  }, []); // mount once only

  /* Rebuild scene group whenever tab or opts change */
  useEffect(() => {
    const scene = sceneRef.current;
    if (!scene) return;

    /* Remove old group */
    if (groupRef.current) {
      scene.remove(groupRef.current);
      groupRef.current = null;
    }

    /* Build new group */
    let newGroup;
    if(tab==='kitchen')  newGroup = buildKitchen(opts);
    if(tab==='wardrobe') newGroup = buildWardrobe(opts);
    if(tab==='vanity')   newGroup = buildVanity(opts);
    if(tab==='tvunit')   newGroup = buildTVUnit(opts);

    if(newGroup){
      scene.add(newGroup);
      groupRef.current = newGroup;
    }
  }, [tab, opts]); // re-runs on every opts change

  return React.createElement('div', {
    ref:mountRef,
    className:'viz-canvas-wrap',
    style:{width:'100%',height:'100%',minHeight:'480px'}
  });
}

function KitchenControls({opts, setOpts}){
  const toggle = (key,val,arr) => setOpts(o=>({...o,[key]:arr.includes(val)?arr.filter(x=>x!==val):[...arr,val]}));
  return React.createElement('div', {className:'viz-ctrl-body'},
    React.createElement('div',{className:'viz-group'},
      React.createElement('div',{className:'viz-group-lbl'},'Layout'),
      React.createElement('div',{className:'viz-chips'},
        ['Straight','L-Shape','U-Shape','Island','Parallel'].map(l=>
          React.createElement('button',{key:l,className:'viz-chip'+(opts.layout===l?' on':''),onClick:()=>setOpts(o=>({...o,layout:l}))},l)
        )
      )
    ),
    React.createElement('div',{className:'viz-group'},
      React.createElement('div',{className:'viz-group-lbl'},'Cabinet Size (ft)'),
      React.createElement('div',{className:'viz-slider-row'},
        React.createElement('input',{type:'range',min:6,max:20,value:opts.size,onChange:e=>setOpts(o=>({...o,size:+e.target.value})),style:{flex:1}}),
        React.createElement('span',{className:'viz-slider-val'},opts.size)
      )
    ),
    React.createElement('div',{className:'viz-group'},
      React.createElement('div',{className:'viz-group-lbl'},'Shutter Finish'),

<!-- ── AMBIENT 3D + SCROLL EFFECTS (plain JS, runs after React mounts) ── -->
<script>
(function(){
  /* ── SCROLL PROGRESS BAR ── */
  const bar = document.getElementById('scroll-bar');
  function updateBar(){
    const s = document.documentElement.scrollTop||document.body.scrollTop;
    const h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    if(bar) bar.style.width = (h > 0 ? (s/h)*100 : 0) + '%';
  }
  window.addEventListener('scroll', updateBar, {passive:true});

  /* ── AMBIENT THREE.JS FLOATING GEOMETRY ── */
  const canvas = document.getElementById('ambient-canvas');
  if(!canvas || typeof THREE === 'undefined') return;

  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,1.5));
  renderer.setClearColor(0x000000,0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 18;

  function resize(){
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize, {passive:true});

  /* Gold wireframe material */
  const wireMat = new THREE.MeshBasicMaterial({color:0xC9A84C, wireframe:true, transparent:true, opacity:0.12});
  const wireMat2 = new THREE.MeshBasicMaterial({color:0xE8C96A, wireframe:true, transparent:true, opacity:0.07});

  /* Create floating shapes */
  const shapes = [];
  const geos = [
    new THREE.OctahedronGeometry(1.1, 0),
    new THREE.TetrahedronGeometry(0.9, 0),
    new THREE.IcosahedronGeometry(0.85, 0),
    new THREE.OctahedronGeometry(0.65, 0),
    new THREE.TetrahedronGeometry(1.2, 0),
    new THREE.IcosahedronGeometry(0.5, 0),
    new THREE.OctahedronGeometry(1.4, 0),
    new THREE.TetrahedronGeometry(0.75, 0),
    new THREE.IcosahedronGeometry(1.0, 0),
    new THREE.OctahedronGeometry(0.55, 0),
    new THREE.TetrahedronGeometry(0.9, 0),
    new THREE.IcosahedronGeometry(0.7, 0),
  ];

  geos.forEach((geo, i) => {
    const mat = i % 3 === 0 ? wireMat.clone() : wireMat2.clone();
    mat.opacity = 0.04 + Math.random()*0.1;
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(
      (Math.random()-0.5)*32,
      (Math.random()-0.5)*22,
      (Math.random()-0.5)*12 - 4
    );
    mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
    mesh.userData = {
      rx: (Math.random()-0.5)*0.004,
      ry: (Math.random()-0.5)*0.005,
      rz: (Math.random()-0.5)*0.003,
      floatSpeed: 0.0004 + Math.random()*0.0006,
      floatAmp:   0.4 + Math.random()*0.8,
      floatOffset:Math.random()*Math.PI*2,
      baseY: mesh.position.y,
    };
    scene.add(mesh);
    shapes.push(mesh);
  });

  /* Ambient light */
  scene.add(new THREE.AmbientLight(0xC9A84C, 0.3));

  /* Mouse parallax */
  let mouseX=0, mouseY=0, targetX=0, targetY=0;
  document.addEventListener('mousemove', e=>{
    mouseX = (e.clientX/window.innerWidth - 0.5)*2;
    mouseY = (e.clientY/window.innerHeight - 0.5)*2;
  },{passive:true});

  /* Scroll parallax */
  let scrollY=0;
  window.addEventListener('scroll',()=>{ scrollY = window.scrollY; },{passive:true});

  let t=0;
  function animate(){
    requestAnimationFrame(animate);
    t += 0.016;

    /* Lerp mouse */
    targetX += (mouseX - targetX)*0.03;
    targetY += (mouseY - targetY)*0.03;

    /* Camera subtle drift */
    camera.position.x = targetX * 1.2;
    camera.position.y = targetY * 0.8 - scrollY * 0.002;
    camera.lookAt(0, -scrollY*0.001, 0);

    shapes.forEach(m=>{
      const u = m.userData;
      m.rotation.x += u.rx;
      m.rotation.y += u.ry;
      m.rotation.z += u.rz;
      m.position.y = u.baseY + Math.sin(t*u.floatSpeed*60 + u.floatOffset)*u.floatAmp;
      /* Parallax depth on scroll */
      m.position.z += ((-scrollY*0.004 + m.userData.baseZ||0) - m.position.z)*0.02;
    });

    renderer.render(scene, camera);
  }
  animate();

  /* Store baseZ */
  shapes.forEach(m=>{ m.userData.baseZ = m.position.z; });

  /* ── COUNTER ANIMATION ── */
  function animateCounters(){
    document.querySelectorAll('.stat-n').forEach(el=>{
      const text = el.textContent;
      const num = parseInt(text.replace(/\D/g,''));
      if(!num || el.dataset.animated) return;
      const suffix = text.replace(/[\d]/g,'');
      let start=0, duration=1800, startTime=null;
      const ease = t => 1 - Math.pow(1-t, 3);
      function step(ts){
        if(!startTime) startTime=ts;
        const progress = Math.min((ts-startTime)/duration,1);
        el.textContent = Math.round(ease(progress)*num) + suffix;
        if(progress<1) requestAnimationFrame(step);
        else el.dataset.animated='1';
      }
      requestAnimationFrame(step);
    });
  }
  const statsObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){ animateCounters(); statsObs.disconnect(); } });
  },{threshold:0.3});
  const statsEl = document.querySelector('.stats-g');
  if(statsEl) statsObs.observe(statsEl);

  /* ── PARALLAX ON SECTIONS ── */
  function onScroll(){
    const sy = window.scrollY;
    document.querySelectorAll('.parallax-slow').forEach(el=>{
      el.style.transform = `translateY(${sy*0.06}px)`;
    });
    document.querySelectorAll('.parallax-mid').forEach(el=>{
      el.style.transform = `translateY(${sy*0.03}px)`;
    });
  }
  window.addEventListener('scroll', onScroll, {passive:true});

})();
</script>
