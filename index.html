<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="icon" type="image/png"href="favicon-5.png">
<meta property="og:title" content="Innerspace"/>
<meta property="og:image" content="https://innerspace.fun" />
<meta property="og:url" content="https://innerspace.com" />
<meta property="og:description" content="Innerspace provides with best interior designs and smoothest installation one can ask for. Modernising your living space elegantly" />
<title>Innerspace — Luxury Interior Design</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<!-- Elfsight loaded here, outside React/Babel -->
<script src="https://elfsightcdn.com/platform.js" async></script>
<!-- React + Babel -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;
  --black:#080808;--black-mid:#101010;--black-card:#141414;--black-soft:#1a1a1a;
  --white:#F5F0E8;--gray:rgba(245,240,232,0.58);
  --rail:72px;--drawer:260px;
  --ease:cubic-bezier(0.25,0.46,0.45,0.94);
}
html{scroll-behavior:smooth}
body{background:var(--black);color:var(--white);font-family:'Montserrat',sans-serif;font-weight:300;overflow-x:hidden}

/* ─── CURSOR ─── */
.cur,.cur-ring{position:fixed;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%)}
.cur{width:8px;height:8px;background:var(--gold);transition:transform .1s}
.cur-ring{width:32px;height:32px;border:1px solid var(--gold);opacity:.5;transition:width .3s,height .3s,opacity .3s,left .15s,top .15s}
.cur-ring.big{width:56px;height:56px;opacity:.22}
@media(hover:none){.cur,.cur-ring{display:none}body{cursor:auto}}

/* ─── LAYOUT ─── */
#app{display:flex;min-height:100vh}
.main{flex:1;min-width:0;transition:margin-left .42s var(--ease)}
.main.shifted{margin-left:var(--rail)}

/* ─── SIDEBAR RAIL ─── */
.rail{
  position:fixed;left:0;top:0;bottom:0;
  width:var(--rail);
  background:var(--black-mid);
  border-right:.5px solid rgba(201,168,76,.13);
  z-index:500;
  display:flex;flex-direction:column;align-items:center;
  padding:1.4rem 0;
  transition:width .42s var(--ease);
}
.rail.open{width:var(--drawer);align-items:flex-start}

/* hamburger */
.hbg{
  width:40px;height:40px;background:none;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  flex-shrink:0;margin-left:16px;margin-bottom:1.6rem;
}
.rail.open .hbg{margin-left:calc(var(--drawer) - var(--rail) - 4px)}
.hbg span{display:block;height:1.5px;background:var(--gold);transition:all .3s}
.hbg span:nth-child(1){width:22px}
.hbg span:nth-child(2){width:15px}
.hbg span:nth-child(3){width:22px}
.hbg.on span:nth-child(1){transform:rotate(45deg) translate(4.5px,4.5px);width:22px}
.hbg.on span:nth-child(2){opacity:0;width:0}
.hbg.on span:nth-child(3){transform:rotate(-45deg) translate(4.5px,-4.5px);width:22px}

/* logo inside rail */
.rail-logo{
  font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:300;
  letter-spacing:.12em;color:var(--gold);white-space:nowrap;
  padding:0 1.1rem;margin-bottom:1.8rem;
  max-width:0;overflow:hidden;opacity:0;
  transition:max-width .35s .1s,opacity .3s .15s;
}
.rail.open .rail-logo{max-width:200px;opacity:1}

/* nav items */
.rail-nav{display:flex;flex-direction:column;gap:.3rem;width:100%;padding:0 .7rem;flex:1}
.nav-btn{
  display:flex;align-items:center;gap:.9rem;
  padding:.72rem .8rem;border-radius:4px;
  background:none;border:none;cursor:pointer;
  color:rgba(245,240,232,.48);
  font-family:'Montserrat',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  white-space:nowrap;width:100%;
  transition:background .25s,color .25s;
}
.nav-btn:hover{background:rgba(201,168,76,.07);color:var(--white)}
.nav-btn.active{background:rgba(201,168,76,.12);color:var(--gold)}
.nav-icon{flex-shrink:0;width:22px;text-align:center;font-size:1rem}
.nav-lbl{opacity:0;transition:opacity .25s .12s;font-size:.6rem;letter-spacing:.18em}
.rail.open .nav-lbl{opacity:1}

/* vertical text when closed */
.rail-tag{
  writing-mode:vertical-rl;font-size:.48rem;letter-spacing:.28em;text-transform:uppercase;
  color:rgba(201,168,76,.3);margin-top:auto;margin-bottom:1rem;
  transition:opacity .2s;pointer-events:none;
}
.rail.open .rail-tag{opacity:0}

/* social links bottom of rail */
.rail-socials{display:flex;flex-direction:column;gap:.6rem;padding:.8rem .7rem}
.rail-social{
  width:32px;height:32px;border:.5px solid rgba(201,168,76,.2);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:.6rem;font-family:'Cormorant Garamond',serif;
  color:var(--gold);text-decoration:none;
  transition:border-color .3s,background .3s;
}
.rail-social:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}

/* overlay behind open rail */
.rail-overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:499;
}
.rail-overlay.show{display:block}

/* ─── MOBILE TOPBAR ─── */
.topbar{
  display:none;
  position:fixed;left:0;right:0;top:0;height:54px;z-index:500;
  background:rgba(8,8,8,.96);backdrop-filter:blur(10px);
  border-bottom:.5px solid rgba(201,168,76,.14);
  align-items:center;justify-content:space-between;padding:0 1.2rem;
}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--gold);letter-spacing:.1em;cursor:pointer}
.topbar-hbg{width:36px;height:36px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.topbar-hbg span{display:block;height:1.5px;background:var(--gold);transition:all .3s}
.topbar-hbg span:nth-child(1){width:20px}
.topbar-hbg span:nth-child(2){width:14px}
.topbar-hbg span:nth-child(3){width:20px}
.topbar-hbg.on span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
.topbar-hbg.on span:nth-child(2){opacity:0}
.topbar-hbg.on span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

/* mobile drawer */
.mob-drawer{
  position:fixed;left:0;top:54px;bottom:0;width:var(--drawer);
  background:var(--black-soft);border-right:.5px solid rgba(201,168,76,.14);
  z-index:499;transform:translateX(-100%);
  transition:transform .4s var(--ease);
  display:flex;flex-direction:column;padding:1.5rem 1rem;gap:.35rem;
}
.mob-drawer.open{transform:translateX(0)}
.mob-overlay{
  position:fixed;inset:0;top:54px;background:rgba(0,0,0,.6);
  z-index:498;opacity:0;pointer-events:none;transition:opacity .3s;
}
.mob-overlay.show{opacity:1;pointer-events:auto}
.mob-socials{display:flex;gap:.8rem;margin-top:auto;padding:.5rem 0}

/* ─── RESPONSIVE SWITCH ─── */
@media(max-width:768px){
  .topbar{display:flex}
  .rail{display:none}
  .main.shifted{margin-left:0}
  .main{padding-top:54px}
}
@media(min-width:769px){
  .mob-drawer,.mob-overlay,.topbar{display:none !important}
}

/* ─── ANIMATIONS ─── */
@keyframes fadeSlide{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:none}}
@keyframes up{from{opacity:0;transform:translateY(26px)}to{opacity:1;transform:none}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes growLine{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
@keyframes cube{0%{transform:rotateX(0) rotateY(0)}100%{transform:rotateX(360deg) rotateY(360deg)}}
@keyframes wapulse{0%,100%{box-shadow:0 4px 18px rgba(37,211,102,.4)}50%{box-shadow:0 4px 26px rgba(37,211,102,.7),0 0 0 8px rgba(37,211,102,.08)}}
@keyframes floatup{0%{opacity:0;transform:translateY(0) translateX(0)}10%{opacity:.32}90%{opacity:.07}100%{opacity:0;transform:translateY(-100vh) translateX(var(--drift))}}

.page{animation:fadeSlide .42s ease}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .75s ease,transform .75s ease}
.reveal.in{opacity:1;transform:none}

/* ─── HERO ─── */
.hero{position:relative;height:100vh;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45}
.hero-ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,8,.3) 0%,rgba(8,8,8,.55) 55%,var(--black) 100%)}
.hero-content{position:relative;z-index:2;text-align:center;padding:0 1.5rem}
.h-tag{font-size:.58rem;letter-spacing:.45em;text-transform:uppercase;color:var(--gold);margin-bottom:1.3rem;animation:up .9s .4s both}
.h-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2.8rem,8vw,6.5rem);font-weight:300;line-height:1.05;margin-bottom:1.6rem;animation:up .9s .7s both}
.h-title em{font-style:italic;color:var(--gold)}
.h-sub{font-size:.65rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gray);margin-bottom:2.5rem;animation:up .9s 1s both}
.h-cta{display:inline-flex;align-items:center;gap:.8rem;border:1px solid var(--gold);padding:.85rem 2rem;font-size:.58rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);cursor:pointer;background:none;transition:background .3s,color .3s;animation:up .9s 1.3s both;font-family:'Montserrat',sans-serif}
.h-cta:hover{background:var(--gold);color:var(--black)}
.h-scroll{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.4rem;font-size:.48rem;letter-spacing:.25em;text-transform:uppercase;color:rgba(245,240,232,.32)}
.h-scroll-line{width:1px;height:34px;background:linear-gradient(180deg,var(--gold),transparent);animation:growLine 1.6s infinite}
@media(max-width:540px){.h-title{font-size:2.6rem}.h-sub{font-size:.58rem}}

/* ─── MARQUEE ─── */
.mq-wrap{overflow:hidden;border-top:.5px solid rgba(201,168,76,.14);border-bottom:.5px solid rgba(201,168,76,.14);padding:1rem 0;background:var(--black-mid)}
.mq-track{display:flex;gap:3rem;animation:marquee 28s linear infinite;white-space:nowrap;width:max-content}
.mq-item{font-size:.56rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(201,168,76,.62);display:flex;align-items:center;gap:.7rem}
.mq-item::after{content:'◆';font-size:.32rem;color:var(--gold)}

/* ─── SECTIONS ─── */
.sec{padding:6rem 4rem}
@media(max-width:768px){.sec{padding:4rem 1.5rem}}
.sec-lbl{font-size:.56rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:.7rem}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.7rem,3.5vw,3rem);font-weight:300;line-height:1.2;margin-bottom:1.1rem}
.sec-title em{font-style:italic;color:var(--gold)}

/* ─── ABOUT ─── */
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:5rem;align-items:center}
@media(max-width:880px){.about-grid{grid-template-columns:1fr;gap:3rem}}
.about-p{font-size:.8rem;line-height:2;color:var(--gray);margin-bottom:1.1rem}
.stats-g{display:grid;grid-template-columns:1fr 1fr;gap:1.1rem}
.stat-c{border:.5px solid rgba(201,168,76,.14);padding:1.7rem;text-align:center;background:var(--black-card);position:relative;overflow:hidden;transition:border-color .3s}
.stat-c::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.05),transparent);opacity:0;transition:opacity .3s}
.stat-c:hover::before{opacity:1}
.stat-c:hover{border-color:var(--gold)}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--gold);line-height:1}
.stat-l{font-size:.52rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(245,240,232,.42);margin-top:.4rem}

/* ─── SERVICES ─── */
.svc-bg{background:var(--black-mid)}
.svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.1rem;margin-top:3rem}
@media(max-width:880px){.svc-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.svc-grid{grid-template-columns:1fr}}
.svc-card{border:.5px solid rgba(201,168,76,.11);padding:2rem;background:var(--black-card);cursor:pointer;transition:transform .4s var(--ease),border-color .3s;position:relative;overflow:hidden}
.svc-card::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1px;background:var(--gold);transition:width .4s}
.svc-card:hover{transform:translateY(-5px);border-color:rgba(201,168,76,.45)}
.svc-card:hover::after{width:100%}
.svc-icon{font-family:'Cormorant Garamond',serif;font-size:2.4rem;color:rgba(201,168,76,.17);margin-bottom:1.1rem;line-height:1}
.svc-name{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:.7rem}
.svc-desc{font-size:.72rem;line-height:1.8;color:var(--gray)}

/* ─── FAQ ─── */
.faq-sec{background:var(--black-mid);position:relative;overflow:hidden}
.faq-sec::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.045),transparent 42%);pointer-events:none}
.faq-head{position:relative;max-width:620px;margin-bottom:2.8rem}
.faq-grid{position:relative;display:grid;grid-template-columns:minmax(220px,.72fr) 1.28fr;gap:3rem;align-items:start}
.faq-note{border-left:1px solid rgba(201,168,76,.42);padding-left:1.4rem;color:var(--gray);font-size:.78rem;line-height:1.9}
.faq-list{display:flex;flex-direction:column;border-top:.5px solid rgba(201,168,76,.16)}
.faq-item{display:grid;grid-template-columns:64px 1fr;gap:1.3rem;padding:1.45rem 0;border-bottom:.5px solid rgba(201,168,76,.16)}
.faq-num{font-family:'Cormorant Garamond',serif;color:rgba(201,168,76,.62);font-size:1.3rem;line-height:1}
.faq-q{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--white);margin-bottom:.55rem;line-height:1.55}
.faq-a{font-size:.74rem;line-height:1.85;color:var(--gray)}
@media(max-width:860px){.faq-grid{grid-template-columns:1fr;gap:2rem}.faq-head{margin-bottom:2rem}}
@media(max-width:520px){.faq-item{grid-template-columns:1fr;gap:.5rem}.faq-num{font-size:1.05rem}}

/* ─── VIDEO SHOWCASE ─── */
.vid-showcase{display:grid;grid-template-columns:1fr 1fr;height:60vh}
@media(max-width:640px){.vid-showcase{grid-template-columns:1fr;height:50vw}}
.vid-panel{position:relative;overflow:hidden;cursor:pointer}
.vid-panel video{width:100%;height:100%;object-fit:cover;transition:transform .8s var(--ease)}
.vid-panel:hover video{transform:scale(1.05)}
.vid-ov{position:absolute;inset:0;background:linear-gradient(0deg,rgba(8,8,8,.8) 0%,rgba(8,8,8,.06) 55%);display:flex;flex-direction:column;justify-content:flex-end;padding:2rem}
.vid-lbl{font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.vid-title{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:300}

/* ─── PROJECTS ─── */
.proj-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:1.1rem;margin-top:3rem}
@media(max-width:880px){.proj-grid{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.proj-grid{grid-template-columns:1fr}}
.p-large{grid-column:span 7}
.p-medium{grid-column:span 5}
.p-small{grid-column:span 4}
@media(max-width:880px){.p-large,.p-medium,.p-small{grid-column:span 1}}
.proj-card{border:.5px solid rgba(201,168,76,.1);overflow:hidden;cursor:pointer;transition:border-color .3s;position:relative;background:var(--black-card)}
.proj-card:hover{border-color:rgba(201,168,76,.5)}
.proj-img{aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:4.5rem;color:rgba(201,168,76,.1);transition:transform .7s var(--ease),color .3s}
.p-large .proj-img{aspect-ratio:16/10}
.proj-card:hover .proj-img{transform:scale(1.06);color:rgba(201,168,76,.22)}
.proj-info{padding:1.1rem;background:var(--black-card)}
.proj-type{font-size:.5rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
.proj-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300}
.proj-line{position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width .4s}
.proj-card:hover .proj-line{width:100%}

/* ─── PROCESS VIDEO ─── */
.process-sec{padding:0;position:relative;overflow:hidden;background:var(--black)}
.process-inner{display:grid;grid-template-columns:1fr 1fr;min-height:520px}
@media(max-width:860px){.process-inner{grid-template-columns:1fr;min-height:auto}}
.process-vid-side{position:relative;overflow:hidden;background:var(--black-soft)}
.process-vid-side video{width:100%;height:100%;object-fit:cover;display:block;transition:transform .8s var(--ease)}
.process-vid-side:hover video{transform:scale(1.03)}
.process-vid-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(8,8,8,.5) 0%,rgba(8,8,8,.1) 100%);display:flex;align-items:center;justify-content:center}
.process-play{width:64px;height:64px;border:1.5px solid rgba(201,168,76,.8);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(8,8,8,.4);transition:background .3s,transform .3s,border-color .3s;backdrop-filter:blur(4px)}
.process-play:hover{background:rgba(201,168,76,.2);border-color:var(--gold);transform:scale(1.08)}
.process-play svg{fill:var(--gold);width:22px;height:22px;margin-left:4px}
.process-play.playing svg{margin-left:0}
.process-text-side{background:var(--black-mid);padding:5rem 4rem;display:flex;flex-direction:column;justify-content:center}
@media(max-width:860px){.process-text-side{padding:3.5rem 1.5rem}}
.process-steps{display:flex;flex-direction:column;gap:1.8rem;margin-top:2.5rem}
.process-step{display:flex;gap:1.4rem;align-items:flex-start}
.step-num{flex-shrink:0;width:36px;height:36px;border:.5px solid rgba(201,168,76,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1rem;color:var(--gold);transition:background .3s,border-color .3s}
.process-step:hover .step-num{background:rgba(201,168,76,.1);border-color:var(--gold)}
/*.step-body{}*/
.step-title{font-size:.68rem;letter-spacing:.15em;text-transform:uppercase;color:var(--white);margin-bottom:.3rem}
.step-desc{font-size:.72rem;line-height:1.75;color:var(--gray)}

/* ─── 3D CUBE ─── */
.cube-sec{background:var(--black-mid);display:flex;align-items:center;gap:5rem;padding:6rem 4rem}
@media(max-width:768px){.cube-sec{flex-direction:column;gap:2.5rem;padding:4rem 1.5rem}}
.cube-wrap{flex-shrink:0;width:210px;height:210px;perspective:680px;cursor:pointer}
.cube-inner{width:100%;height:100%;transform-style:preserve-3d;animation:cube 14s linear infinite}
.c-face{position:absolute;inset:0;border:1px solid rgba(201,168,76,.27);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:300;letter-spacing:.08em;background:rgba(8,8,8,.82);color:var(--gold)}
.f-fr{transform:translateZ(105px)}
.f-bk{transform:rotateY(180deg) translateZ(105px)}
.f-rt{transform:rotateY(90deg) translateZ(105px)}
.f-lt{transform:rotateY(-90deg) translateZ(105px)}
.f-tp{transform:rotateX(90deg) translateZ(105px)}
.f-bt{transform:rotateX(-90deg) translateZ(105px)}

/* ─── CTA ─── */
.cta-sec{text-align:center;position:relative;overflow:hidden;padding:6rem 4rem}
.cta-sec::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(201,168,76,.07),transparent 70%);pointer-events:none}
.cta-sec .cta-title,.cta-sec .cta-sub,.cta-sec .btn-row{position:relative;z-index:1}
.cta-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4.5vw,4.2rem);font-weight:300;margin-bottom:1.6rem;position:relative}
.cta-title em{font-style:italic;color:var(--gold)}
.cta-sub{font-size:.72rem;color:var(--gray);margin-bottom:2rem;letter-spacing:.1em}
.btn-row{display:flex;gap:1.1rem;justify-content:center;flex-wrap:wrap}

/* ─── BUTTONS ─── */

/* ── REVEAL HOOK ── */
function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, {threshold:0.05, rootMargin:'0px 0px -20px 0px'});
    els.forEach(el => {
      // If already in viewport, mark immediately
      const rect = el.getBoundingClientRect();
      if (rect.top < window.innerHeight && rect.bottom > 0) {
        el.classList.add('in');
      } else {
        obs.observe(el);
      }
    });
    return () => obs.disconnect();
  });
}

  const [kShutter,setKShutter]= useState('Acrylic High-Gloss');
  const [kCounter,setKCounter]= useState('Quartz');
  const [kAppl,   setKAppl]   = useState([]);
  const [kCabinet,setKCabinet]= useState('18mm HDHMR');

  /* ── WARDROBE STATE ── */
  const [wWidth,  setWWidth]  = useState(6);
  const [wHeight, setWHeight] = useState(8);
  const [wType,   setWType]   = useState('Sliding');
  const [wFinish, setWFinish] = useState('Laminate');
  const [wAcc,    setWAcc]    = useState([]);

  /* ── VANITY STATE ── */
  const [vSize,   setVSize]   = useState('Single Sink');
  const [vFinish, setVFinish] = useState('High-Gloss Lacquer');
  const [vMirror, setVMirror] = useState('LED Backlit');
  const [vBasin,  setVBasin]  = useState('Under-mount');

  /* ── TV UNIT STATE ── */
  const [tWidth,  setTWidth]  = useState(8);
  const [tStyle,  setTStyle]  = useState('Full Wall');
  const [tFinish, setTFinish] = useState('Matte Laminate');
  const [tAcc,    setTAcc]    = useState([]);

  const toggleArr = (arr, setArr, val) =>
    setArr(arr.includes(val) ? arr.filter(x=>x!==val) : [...arr, val]);

  /* ── PRICE LOGIC ── */
  const calcKitchen = () => {
    const base = {
      'Straight': 45000, 'L-Shape': 55000, 'U-Shape': 75000,
      'Island': 95000, 'Parallel': 65000
    }[kLayout] || 55000;
    const shutterMult = {
      'Acrylic High-Gloss':1.0,'Membrane':0.82,'PU Paint':1.15,
      'Veneer':1.25,'Laminate':0.75,'Lacquered Glass':1.35
    }[kShutter] || 1;
    const counterAdd = {
      'Quartz':18000,'Granite':14000,'Marble':22000,
      'Compact Laminate':9000,'Corian':16000
    }[kCounter] || 14000;
    const cabinetMult = {'18mm HDHMR':1.0,'18mm BWR Plywood':1.12,'Marine Plywood':1.22}[kCabinet]||1;
    const applAdd = kAppl.length * 8000;
    return Math.round((base * kSize * shutterMult * cabinetMult + counterAdd + applAdd) / 1000) * 1000;
  };

  const calcWardrobe = () => {
    const sqft = wWidth * wHeight;
    const base = {'Sliding':950,'Hinged':820,'Walk-in Open':780,'Pocket':1050}[wType]||900;
    const finMult = {'Laminate':1.0,'Veneer':1.25,'PU Paint':1.18,'Acrylic':1.32,'Membrane':0.88}[wFinish]||1;
    const accAdd = wAcc.includes('LED Lighting')?6500:0
      + (wAcc.includes('Velvet Drawers')?4500:0)
      + (wAcc.includes('Shoe Racks')?3500:0)
      + (wAcc.includes('Mirror Panel')?5000:0)
      + (wAcc.includes('Trouser Pull-out')?3000:0);
    return Math.round((sqft * base * finMult + accAdd) / 500) * 500;
  };

  const calcVanity = () => {
    const base = {'Single Sink':48000,'Double Sink':78000,'Floating Vanity':55000,'Freestanding':65000}[vSize]||48000;
    const finMult = {'High-Gloss Lacquer':1.0,'Matte Lacquer':0.95,'Veneer':1.2,'Acrylic':1.1,'PU Paint':1.08}[vFinish]||1;
    const mirrorAdd = {'LED Backlit':12000,'Plain Frameless':5500,'Medicine Cabinet':9500,'Fog-free LED':15000}[vMirror]||8000;
    const basinAdd = {'Under-mount':4500,'Vessel':6000,'Semi-recessed':3800,'Above-counter':7000}[vBasin]||4500;
    return Math.round((base * finMult + mirrorAdd + basinAdd) / 500) * 500;
  };

  const calcTV = () => {
    const base = {'Full Wall':3800,'Floating Panel':2800,'L-Shape Unit':3200,'Entertainment Hub':4200}[tStyle]||3200;
    const finMult = {'Matte Laminate':1.0,'High-Gloss':1.1,'Veneer':1.22,'PU Paint':1.15,'Fluted Panel':1.18}[tFinish]||1;

/* ── APP ── */
function App() {
  const [page, setPage]           = useState('home');
  const [railOpen, setRailOpen]   = useState(false);
  const [mobOpen,  setMobOpen]    = useState(false);
  const [isMobile, setIsMobile]   = useState(window.innerWidth <= 768);

  useEffect(() => {
    const onResize = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', onResize);
    return () => window.removeEventListener('resize', onResize);
  }, []);

  const go = useCallback(p => {
    setPage(p); setRailOpen(false); setMobOpen(false);
    if (p === 'faq') {
      window.setTimeout(() => {
        const faq = document.getElementById('faq-section');
        if (faq) faq.scrollIntoView({behavior:'smooth', block:'start'});
      }, 60);
    } else {
      window.scrollTo(0, 0);
    }
  }, []);

  return React.createElement(React.Fragment, null,
    React.createElement(Cursor),
    React.createElement(Particles),
    isMobile

    React.createElement('div', {id:'app-inner', className:'main'+((!isMobile)?' shifted':'')},

      page==='catalogue'  && React.createElement(Catalogue,      {setPage:go}),
      page==='calculator' && React.createElement(PriceCalculator,{setPage:go}),
      page==='contact'    && React.createElement(Contact,         {setPage:go})
